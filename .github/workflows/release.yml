name: Release Build and Update

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build frontend and compile Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Fit v__VERSION__'
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          updaterJsonPreferNsis: true

      - name: Download latest.json and push as updater.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"

          echo "=== Updating updater.json for version $VERSION ==="

          # tauri-action ha già generato e caricato latest.json nella release.
          # Lo scarichiamo e lo salviamo come updater.json sul ramo main.

          LATEST_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/latest.json"
          echo "Downloading latest.json from: $LATEST_URL"

          # Retry fino a 3 volte (la release potrebbe non essere subito raggiungibile)
          for attempt in 1 2 3; do
            curl -sL -o updater.json "$LATEST_URL"

            if [ -s updater.json ]; then
              echo "Download successful on attempt $attempt!"
              break
            fi

            echo "Attempt $attempt failed. Waiting 15s..."
            sleep 15
          done

          if [ ! -s updater.json ]; then
            echo "ERROR: Failed to download latest.json after 3 attempts"
            exit 1
          fi

          echo ""
          echo "=== updater.json contents ==="
          cat updater.json
          echo ""

          # Commit e push di updater.json su main
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git stash || true
          git checkout main
          git pull origin main
          git add updater.json
          git commit -m "chore: auto-update updater.json to $VERSION [skip ci]" || true
          git push origin main

          echo "=== Done! updater.json v$VERSION pushed to main ==="
