name: Release Build and Update

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build frontend and compile Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Fit v__VERSION__' 
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          releaseBody: ${{ steps.release_notes.outputs.changelog }}
          updaterJsonPreferNsis: true

      - name: Download latest.json and push as updater.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"

          echo "=== Updating updater.json for version $VERSION ==="

          LATEST_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/latest.json"
          echo "Downloading latest.json from: $LATEST_URL"

          # Retry up to 5 times with increasing delay
          for attempt in 1 2 3 4 5; do
            curl -sL -o updater.json "$LATEST_URL"

            if [ -s updater.json ]; then
              echo "Download successful on attempt $attempt!"
              break
            fi

            echo "Attempt $attempt failed. Waiting $((attempt * 10))s..."
            sleep $((attempt * 10))
          done

          if [ ! -s updater.json ]; then
            echo "ERROR: Failed to download latest.json after 5 attempts"
            exit 1
          fi

          echo ""
          echo "=== updater.json contents ==="
          cat updater.json
          echo ""

          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to main branch
          git fetch origin main
          git checkout main
          git pull origin main

          # Check if updater.json has actually changed
          if git diff --quiet updater.json; then
            echo "No changes to updater.json, skipping push."
          else
            git add updater.json
            git commit -m "chore: auto-update updater.json to $VERSION [skip ci]"
            
            # Use GITHUB_TOKEN for push to handle potential permission issues
            git push "https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main
          fi

          echo "=== Done! updater.json v$VERSION sync process complete ==="
